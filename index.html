<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Database</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
    <script src="https://kit.fontawesome.com/7bca18a533.js" crossorigin="anonymous"></script>
</head>
<body>
    <section id="landing">
        <nav>
            <div class="nav__container">
                <img class="logo" src="./Assets/Movie database logo.png" alt="Movie Database Logo">
                <ul class="nav__links">
                    <li><a href="#" class="nav__link">Home</a></li>
                    <li><a href="#" class="nav__link">Movies</a></li>
                    <li><a href="#" class="nav__link">Contact</a></li>
                </ul>
            </div>
        </nav>
        <header> 
            <div class="header__container">
                <div class="header__description">
                    <h2>America's largest movie databse.</h2>
                    <div class="header__search">
                        <input 
                        type="text"
                        id="search__input"
                        placeholder="Search by title, keyword, year..."
                        class="search__input">
                        <button type="submit" class="search__button">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>
    </section>

    <main>
        <section id="search__results">
            <div class="container">
                <div class="row">
                    <h2 class="section__title">Search results:</h2>

                    <div class="results__sort">
                        <label for="sort__select" class="results__sort--label">Sort By:</label>
                        <select id="sort__select" class="results__sort--select">
                            <option value="az">A – Z</option>
                            <option value="za">Z – A</option>
                            <option value="year__oldest">Year: Oldest</option>
                            <option value="year__newest">Year: Newest</option>
                        </select>
                    </div>  
                </div>

                <div id="results__grid" class="results__grid">
                    <div class="movie">
                        <img src="" alt="Movie Poster">
                        <h3 class="movie__title">Movie Title</h3>
                        <p class="movie__year">2026</p>
                        <button class="movie__details">View Details</button>
                    </div>
                </div>
            </div>  
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="row row__column">
            <a href="#">
                <figure class="footer__logo">
                <img src="./Assets/Movie database logo.png" class="footer__logo--img" alt="Movie Database Logo">
                </figure>
            </a>
            <div class="footer__list">
                <a href="#" class="footer__link">Home</a>
                <a href="#" class="footer__link no-cursor">Movies</a>
                <a class="footer__link no-cursor">Contact</a>
            </div>
            <div class="footer__copyright">Copyright &copy; 2026 Patrick Hudson</div>
            </div>
        </div>
    </footer>
</body>
</html>
